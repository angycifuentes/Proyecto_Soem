<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método de Pago</title>
    <link rel="stylesheet" href="./assets/css/Style.css">
</head>
<body>

    <div class="form-container">
        <form action="#">
            <h2>Método de Pago</h2>
            
            <div class="input-group">
                <label for="id_metodo">Método de Pago</label>

                <select class="form-select" aria-label="Seleccione Metodo de Pago">
                    <option selected>Seleccione Metodo de Pago</option>
                    <option value="1">Efectivo</option>
                    <option value="2">Tarjeta debito</option>
                    <option value="3">Tarjeta credito</option>
                    </option>
                </select>
            </div>

            <div class="input-group">
                <label for="Monto">Monto</label>
                <input type="text" id="Monto" name="Monto" maxlength="45" placeholder="Monto total">
            </div>

            <button type="submit">Pagar</button>
        </form>
    </div>

</body>
</html>
