<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Productos</title>
    <link rel="stylesheet" href="./assets/css/Style.css">
</head>
<body>

    <div class="form-container">
        <h2>Gestión de Productos</h2>
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="nombre">Nombre del Producto</label>
                <input type="text" id="nombre" name="nombre" maxlength="45" placeholder="Ej: Laptop Dell" required>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" name="descripcion" maxlength="45" placeholder="Detalles del producto" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="stock">Stock / Existencias</label>
                <input type="text" id="stock" name="stock" maxlength="45" placeholder="Ej: 50 unidades" required>
            </div>

            <button type="submit" class="btn-submit">Registrar Producto</button>
        </form>
    </div>

</body>
</html>
