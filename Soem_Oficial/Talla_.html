<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Tallas</title>
    <link rel="stylesheet" href="./assets/css/Style.css">
</head>
<body>

    <div class="form-container">
        <h2>Configuración de Tallas</h2>
        <form action="#" method="POST">
            <label for="Genero">Talla</label>
            <select class="form-select" aria-label="Selecione el tipo de talla">
                <option selected>Selecione el tipo de talla</option>
                <option value="1">Hombre</option>
                <option value="2">Mujer</option>
                <option value="3">Unisex</option>
                <option value="4">Niño</option>
            </select>

            <label for="Genero">Talla Parte Superior</label>
            <select class="form-select" aria-label="Selecione la talla">
                <option selected>Selecione la talla</option>
                <option value="1">XS</option>
                <option value="2">S</option>
                <option value="3">M</option>
                <option value="4">L</option>
                <option value="5">XL</option>
            </select>

            <label for="Genero">Talla Parte Inferior</label>
            <select class="form-select" aria-label="Selecione la talla">
                <option selected>Selecione la talla</option>
                <option value="1">6</option>
                <option value="2">8</option>
                <option value="3">10</option>
                <option value="4">12</option>
                <option value="5">14</option>
                <option value="6">16</option>
            </select>

            <button type="submit" class="btn-submit">Guardar Tallaje</button>
        </form>
    </div>

</body>
</html>
