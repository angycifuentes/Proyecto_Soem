<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Colores</title>
    <link rel="stylesheet" href="./assets/css/Style.css">
</head>
<body>

    <div class="form-container">
        <h2>Catálogo de Colores</h2>
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="codigoRGB">Código RGB</label>
                <input type="text" id="codigoRGB" name="codigoRGB" maxlength="45" placeholder="Ej: rgb(255, 0, 0) o #FF0000" required>
            </div>
            <button type="submit" class="btn-submit">Registrar Color</button>
        </form>
    </div>

</body>
</html>
