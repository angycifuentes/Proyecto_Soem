<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="./assets/css/Style.css">
</head>
<body>
    <div class="form-container">
        <h2>Registro de Usuario</h2>
        <form action="#">
            <div class="row">
                <div class="input-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>
                </div>
                <div class="input-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Tu apellido" required>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="tipo-doc">Tipo de Documento</label>
                    <select id="tipo-doc" required>
                        <option value="" disabled selected>Selecciona</option>
                        <option value="cc">Cédula de Ciudadanía</option>
                        <option value="ce">Cédula de Extranjería</option>
                        <option value="pasaporte">Pasaporte</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="documento">Documento</label>
                    <input type="number" id="documento" placeholder="Número" required>
                </div>
            </div>

            <div class="input-group">
                <label for="rol">Rol</label>
                <select id="rol" required>
                    <option value="" disabled selected>Selecciona tu rol</option>
                    <option value="admin">Administrador</option>
                    <option value="editor">Editor</option>
                    <option value="usuario">Usuario Estándar</option>
                </select>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" placeholder="Ej: 3001234567" required>
                </div>
                <div class="input-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="correo@ejemplo.com" required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="submit" class="btn-submit">Registrar</button>
        </form>
    </div>
</body>
</html>
