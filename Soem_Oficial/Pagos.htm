<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Pagos</title>
    <link rel="stylesheet" href="./assets/css/Style.css">
</head>
<body>

    <div class="form-container">
        <form action="#">
            <h2>Registro de Pagos</h2>
            
            <div class="input-group">
                <label for="id_compra">Compra</label>
                <input type="text" id="id_compra" name="id_compra" maxlength="45" placeholder="Referencia de compra" required>
            </div>

            <div class="input-group">
                <label for="producto">Producto</label>
                <input type="text" id="producto" name="producto" maxlength="45" placeholder="Nombre del producto" required>
            </div>

            <div class="input-group">
                <label for="monto">Monto</label>
                <input type="text" id="monto" name="monto" maxlength="45" placeholder="Ej: 250.00" required>
            </div>
            
            <button type="submit">Procesar Pago</button>
        </form>
    </div>

</body>
</html>
