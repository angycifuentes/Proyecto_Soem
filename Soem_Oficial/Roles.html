 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Roles</title>
    <link rel="stylesheet" href="./assets/css/Style.css">
</head>
<body>

    <div class="form-container">
        <h2>Gestión de Roles</h2>
        <form action="#" method="POST">
            
            <div class="form-group">
                <label for="nombre">Nombre del Rol</label>
                <input type="text" id="nombre" name="nombre" maxlength="45" placeholder="Ej: Administrador" required>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" name="descripcion" maxlength="45" placeholder="Breve descripción del rol" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="id_usuario">ID de Usuario Asociado</label>
                <input type="number" id="id_usuario" name="id_usuario" placeholder="Ingrese el ID numérico" required>
            </div>

            <button type="submit" class="btn-submit">Guardar Rol</button>
        </form>
    </div>

</body>
</html>
